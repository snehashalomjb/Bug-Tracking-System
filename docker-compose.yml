version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bug_tracker_db
    restart: always
    environment:
      MYSQL_DATABASE: bug_tracker
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pwhateveryouwant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bug_tracker_backend
    restart: always
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/bug_tracker
      - JWT_SECRET=yoursecretkeyforjwtauthenticationwhichshouldbesecureandverylong
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE_MB=5
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bug_tracker_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  upload_data:
